<!doctype html>
<html lang="ja">
  <head>
    <style>
      body {
        max-width: 800px;
        margin: 40px auto;
        padding: 0 16px;
        font-family: system-ui, sans-serif;
      }

      #chat-form,
      #load-form {
        display: flex;
        gap: 8px;
      }

      #load-form {
        margin-bottom: 16px;
      }

      #new-conversation-button {
        margin-top: 8px;
      }

      #message-input,
      #conversation-id-input {
        flex: 1;
        padding: 8px;
      }

      .message {
        margin: 8px 0;
        padding: 8px 12px;
        border-radius: 8px;
        white-space: pre-wrap;
      }

      .message-user {
        background: #eef5ff;
      }

      .message-ai {
        background: #f4f4f4;
      }

      .message-error {
        background: #fff0f0;
      }

      button {
        padding: 8px 16px;
      }

      #loading-message {
        margin: 8px 0 0;
        color: #666;
      }
    </style>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Agent Chat</title>
  </head>
  <body>
    <h1>AI Agent Chat</h1>

    <form id="load-form">
      <input id="conversation-id-input" type="number" placeholder="会話ID" min="1" />
      <button type="submit">履歴を読み込む</button>
    </form>

    <div id="messages"></div>

    <form id="chat-form">
      <input id="message-input" type="text" placeholder="メッセージを入力" required />
      <button type="submit">送信</button>
    </form>
    <p id="loading-message" hidden>AIが考えています...</p>
    <p id="current-conversation-id">現在の会話ID: 未作成</p>
    <button id="new-conversation-button" type="button">新規会話</button>
    <script>
      const form = document.getElementById("chat-form");
      const loadForm = document.getElementById("load-form");
      const input = document.getElementById("message-input");
      const conversationIdInput = document.getElementById("conversation-id-input");
      const messages = document.getElementById("messages");
      const loadingMessage = document.getElementById("loading-message");
      const submitButton = form.querySelector("button");
      const conversationHistory = [];
      const currentConversationId = document.getElementById("current-conversation-id");
      const newConversationButton = document.getElementById("new-conversation-button");
      let conversationId = null;

      function addMessage(label, text, type) {
        const message = document.createElement("p");
        message.classList.add("message", `message-${type}`);
        message.textContent = `${label}: ${text}`;
        messages.appendChild(message);
      }

      function renderConversationHistory() {
        messages.innerHTML = "";

        for (const message of conversationHistory) {
          const label = message.role === "user" ? "あなた" : "AI";
          const type = message.role === "user" ? "user" : "ai";
          addMessage(label, message.content, type);
        }
      }

      function updateCurrentConversationId() {
        currentConversationId.textContent =
          conversationId === null
            ? "現在の会話ID: 未作成"
            : `現在の会話ID: ${conversationId}`;
      }

      newConversationButton.addEventListener("click", () => {
        conversationId = null;
        conversationHistory.length = 0;
        messages.innerHTML = "";
        conversationIdInput.value = "";
        updateCurrentConversationId();
        input.focus();
      });

      loadForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        const requestedConversationId = conversationIdInput.value.trim();
        if (!requestedConversationId) {
          return;
        }

        try {
          const response = await fetch(`/conversations/${requestedConversationId}`);

          if (!response.ok) {
            throw new Error("会話履歴の読み込みに失敗しました。");
          }

          const data = await response.json();
          conversationId = Number(data.conversation_id);
          conversationIdInput.value = conversationId;
          updateCurrentConversationId();
          conversationHistory.length = 0;
          conversationHistory.push(...data.messages);
          renderConversationHistory();
          input.focus();
        } catch (error) {
          addMessage("エラー", error.message, "error");
        }
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const userMessage = input.value.trim();
        if (!userMessage) {
          return;
        }

        conversationHistory.push({ role: "user", content: userMessage });
        addMessage("あなた", userMessage, "user");
        input.value = "";
        input.disabled = true;
        submitButton.disabled = true;
        loadingMessage.hidden = false;

        try {
          const response = await fetch("/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              conversation_id: conversationId,
              messages: conversationHistory,
            }),
          });

          if (!response.ok) {
            throw new Error("APIリクエストに失敗しました。");
          }

          const data = await response.json();
          conversationId = Number(data.conversation_id);
          conversationIdInput.value = conversationId;
          updateCurrentConversationId();
          conversationHistory.push({ role: "assistant", content: data.reply });
          addMessage("AI", data.reply, "ai");
        } catch (error) {
          addMessage("エラー", error.message, "error");
        } finally {
          input.disabled = false;
          submitButton.disabled = false;
          loadingMessage.hidden = true;
          input.focus();
        }
      });
    </script>
  </body>
</html>
