<!doctype html>
<html lang="ja">
  <head>
    <style>
      body {
        max-width: 800px;
        margin: 40px auto;
        padding: 0 16px;
        font-family: system-ui, sans-serif;
      }

      #messages {
        min-height: 300px;
        margin-bottom: 16px;
        padding: 16px;
        border: 1px solid #ddd;
        border-radius: 8px;
      }

      .message {
        margin: 8px 0;
        padding: 8px 12px;
        border-radius: 8px;
        white-space: pre-wrap;
      }

      .message-user {
        background: #eef5ff;
      }

      .message-ai {
        background: #f4f4f4;
      }

      .message-error {
        background: #fff0f0;
      }

      #chat-form {
        display: flex;
        gap: 8px;
      }

      #message-input {
        flex: 1;
        padding: 8px;
      }

      button {
        padding: 8px 16px;
      }

      #loading-message {
        margin: 8px 0 0;
        color: #666;
      }
    </style>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Agent Chat</title>
  </head>
  <body>
    <h1>AI Agent Chat</h1>

    <div id="messages"></div>

    <form id="chat-form">
      <input id="message-input" type="text" placeholder="メッセージを入力" required />
      <button type="submit">送信</button>
    </form>
    <p id="loading-message" hidden>AIが考えています...</p>

    <script>
      const form = document.getElementById("chat-form");
      const input = document.getElementById("message-input");
      const messages = document.getElementById("messages");
      const loadingMessage = document.getElementById("loading-message");
      const submitButton = form.querySelector("button");
      const conversationHistory = [];
      let conversationId = null;

      function addMessage(label, text, type) {
        const message = document.createElement("p");
        message.classList.add("message", `message-${type}`);
        message.textContent = `${label}: ${text}`;
        messages.appendChild(message);
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const userMessage = input.value.trim();
        if (!userMessage) {
          return;
        }

        conversationHistory.push({ role: "user", content: userMessage });
        addMessage("あなた", userMessage, "user");
        input.value = "";
        input.disabled = true;
        submitButton.disabled = true;
        loadingMessage.hidden = false;

        try {
          const response = await fetch("/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              conversation_id: conversationId,
              messages: conversationHistory,
            }),
          });

          if (!response.ok) {
            throw new Error("APIリクエストに失敗しました。");
          }

          const data = await response.json();
          conversationId = data.conversation_id;
          conversationHistory.push({ role: "assistant", content: data.reply });
          addMessage("AI", data.reply, "ai");
        } catch (error) {
          addMessage("エラー", error.message, "error");
        } finally {
          input.disabled = false;
          submitButton.disabled = false;
          loadingMessage.hidden = true;
          input.focus();
        }
      });
    </script>
  </body>
</html>
